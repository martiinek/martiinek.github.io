<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontaktní formulář</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
      margin: 0 auto; /* Centrování formuláře */
    }

    label {
      display: block;
      margin-bottom: 10px;
      padding-right: 20px;
    }

    input[type="email"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button[type="submit"] {
      background-color: #007BFF;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
    <h2>Kontaktujte nás<br></h2>

    <form
        action="https://formspree.io/f/xnqk"
        method="POST"
    >
        <label>
            Váš email:
            <input type="email" name="email" required>
        </label>
        <label>
            Vaše požadavky:
            <textarea name="message" required></textarea>
        </label>
        <!-- Další pole formuláře zde -->
        <button type="submit" id="submit">Odeslat</button>
    </form>

    <script type="text/javascript">
        let btn = document.getElementById("submit");
        btn.addEventListener("click", function (event) {
            if (!checkCookie("formSubmitted")) {
                // Tlačítko nebylo stisknuto v posledních 3 hodinách
                // Vložte kód pro odeslání formuláře
                // Nastavte cookie pro označení, že formulář byl odeslán
                setCookie("formSubmitted", "true", 3);
            } else {
                // Tlačítko bylo stisknuto v posledních 3 hodinách, zabraňte odeslání formuláře
                event.preventDefault();
                alert("Můžete odeslat formulář pouze jednou za 3 hodiny.");
            }
        });

        // Funkce pro nastavení cookie
        function setCookie(cname, cvalue, hours) {
            var d = new Date();
            d.setTime(d.getTime() + (hours * 60 * 60 * 1000));
            var expires = "expires=" + d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
        }

        // Funkce pro zkontrolování existence cookie
        function checkCookie(cname) {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.startsWith(cname + "=")) {
                    return true;
                }
            }
            return false;
        }
    </script>
</body>
</html>
