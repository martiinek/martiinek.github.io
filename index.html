<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontaktní formulář</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
      margin: 0 auto; /* Centrování formuláře */
    }

    label {
      display: block;
      margin-bottom: 10px;
      padding-right: 20px;
    }

    input[type="email"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button[type="submit"] {
      background-color: #007BFF;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <form
    //action="https://formspree.io/f/xnqkvebl"
    //method="POST"
  >
    <label>
      Váš email:
      <input type="email" name="email" required>
    </label>
    <label>
      Vaše požadavky:
      <textarea name="message" required></textarea>
    </label>
    <!-- další pole formuláře zde -->
    <button type="submit">Submit</button>
    <script type="text/javascript">
        let count = 0;
        let btn = document.getElementById("submit");
        let disp = document.getElementById("display"):
        btn.addEventListener("click", function () {
            count++;
            disp.innerHTML = count;
        });
    </script>
  </form>
</body>
</html>
